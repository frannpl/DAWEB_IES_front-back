<div class="main-container">
  <div style="display: flex; justify-content: space-between; align-items: flex-end;">
    <div>
      <h2 style="margin-bottom: 0.5rem;">Listado de Profesores</h2>
      <p style="color: var(--text-muted); margin-bottom: 2rem; font-weight: 500;">
        Personal docente y especialidades académicas.
      </p>
    </div>
    <button style="margin-bottom: 2rem; background: #10b981; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 12px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);">
      + Nuevo Profesor
    </button>
  </div>

  <div class="table-card">
    <table class="modern-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Nombre del Docente</th>
          <th>Especialidad</th>
        </tr>
      </thead>
      <tbody>
        @for (p of profesores; track p.id) {
          <tr (click)="seleccionar(p)" style="cursor: pointer;">
            <td class="id-tag">#{{ p.id }}</td>
            <td>
              <div style="font-weight: 700; color: var(--text-main);">{{ p.nombre }}</div>
              <div style="font-size: 0.85rem; color: var(--text-muted);">{{ p.apellidos }}</div>
            </td>
            <td>
              <span class="badge-pill" style="background: #ecfdf5; color: #059669; border-color: #d1fae5;">{{ p.especialidad }}</span>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>

  <app-profesor-detalle 
    [profesor]="profesorSeleccionado" 
    (cerrar)="profesorSeleccionado = null">
  </app-profesor-detalle>
</div>
